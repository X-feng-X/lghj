
worker_processes  1;

events {
    worker_connections  1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;
    sendfile        on;
    keepalive_timeout  65;

    server {
        listen       80;
        server_name  localhost;

        # 前端静态资源
        location / {
            root   /usr/share/nginx/html; # 根据实际部署路径修改
            index  index.html index.htm;
            try_files $uri $uri/ /index.html;
        }

        # 预测服务 (FastAPI Port 8001)
        # 前端请求 /api/ml/xxx -> 后端 /xxx
        location /api/ml/ {
            proxy_pass http://127.0.0.1:8001/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # 股票数据服务 (FastAPI Port 8002)
        # 前端请求 /api/user/stock/data -> 后端 /api/user/stock/data
        location /api/user/stock/data {
            proxy_pass http://127.0.0.1:8002/api/user/stock/data;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # 主后端服务 (Spring Boot Port 8080)
        # 前端请求 /api/xxx -> 后端 /api/xxx
        location /api/ {
            proxy_pass http://127.0.0.1:8080/api/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
    }
}
