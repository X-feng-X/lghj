version: "3.8"

services:
  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: "205219"
      MYSQL_DATABASE: "lghj"
      TZ: "Asia/Shanghai"
    command:
      - "--default-authentication-plugin=mysql_native_password"
      - "--character-set-server=utf8mb4"
      - "--collation-server=utf8mb4_bin"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./feng-lghj/sql/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
      - ./feng-lghj/sql/add.sql:/docker-entrypoint-initdb.d/02-add.sql:ro
    ports:
      - "3306:3306"

  redis:
    image: redis:7.2-alpine
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"

  timescaledb:
    image: timescale/timescaledb:latest-pg14
    environment:
      POSTGRES_USER: "postgres"
      POSTGRES_PASSWORD: "123456"
      POSTGRES_DB: "lghj"
      TZ: "Asia/Shanghai"
    volumes:
      - timescaledb_data:/var/lib/postgresql/data
      - ./feng-lghj/sql/timescale.sql:/docker-entrypoint-initdb.d/01-timescale.sql:ro
    ports:
      - "5432:5432"

  namesrv:
    image: apache/rocketmq:4.9.4
    container_name: rmqnamesrv
    ports:
      - "9876:9876"
    command: sh mqnamesrv
    environment:
      JAVA_OPT_EXT: "-server -Xms128m -Xmx128m -Xmn128m"

  broker:
    image: apache/rocketmq:4.9.4
    container_name: rmqbroker
    ports:
      - "10911:10911"
      - "10909:10909"
    command: sh mqbroker -n namesrv:9876 -c /opt/rocketmq/conf/broker.conf
    depends_on:
      - namesrv
    environment:
      JAVA_OPT_EXT: "-server -Xms128m -Xmx128m -Xmn128m"
      NAMESRV_ADDR: "namesrv:9876"
    volumes:
      - ./feng-lghj/rmq/broker.conf:/opt/rocketmq/conf/broker.conf:ro

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:7.17.18
    environment:
      discovery.type: "single-node"
      xpack.security.enabled: "false"
      ES_JAVA_OPTS: "-Xms512m -Xmx512m"
    volumes:
      - es_data:/usr/share/elasticsearch/data
    ports:
      - "9200:9200"

  lghj-server:
    build:
      context: ./feng-lghj
      dockerfile: lghj-server/Dockerfile
    environment:
      SPRING_PROFILES_ACTIVE: "docker"
      TZ: "Asia/Shanghai"
    depends_on:
      - mysql
      - redis
      - timescaledb
      - namesrv
      - broker
      - elasticsearch
    ports:
      - "8080:8080"

  prediction-service:
    build:
      context: ./stockPredict-master/stockPredict-master
      dockerfile: Dockerfile
    command: ["python", "prediction_service.py"]
    environment:
      TZ: "Asia/Shanghai"
    ports:
      - "8001:8001"

  stock-data-service:
    build:
      context: ./stockPredict-master/stockPredict-master
      dockerfile: Dockerfile
    command: ["python", "stock_data_service.py"]
    environment:
      TZ: "Asia/Shanghai"
    ports:
      - "8002:8002"

  web:
    build:
      context: ./lghj_web
      dockerfile: Dockerfile
    depends_on:
      - lghj-server
      - prediction-service
      - stock-data-service
    ports:
      - "80:80"

volumes:
  mysql_data:
  redis_data:
  timescaledb_data:
  es_data:

