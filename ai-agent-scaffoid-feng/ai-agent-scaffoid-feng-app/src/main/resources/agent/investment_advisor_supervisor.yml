ai:
  agent:
    config:
      tables:
        investmentAdvisor:
          app-name: InvestmentAdvisorApp
          agent:
            agent-id: investment-advisor
            agent-name: 智能投资顾问
            agent-desc: 基于多智能体层级编排的股票投资咨询助手
          module:
            ai-api:
              base-url: ${AI_AGENT_BASE_URL:https://api.deepseek.com}
              api-key: ${AI_AGENT_API_KEY:}
              completions-path: ${AI_AGENT_COMPLETIONS_PATH:/v1/chat/completions}
              embeddings-path: ${AI_AGENT_EMBEDDINGS_PATH:/v1/embeddings}
            chat-model:
              model: ${AI_AGENT_MODEL:deepseek-chat}
              tool-mcp-list:
                - local:
                    name: investmentTradeProfileMcp
              tool-skills-list:
                - type: resource
                  path: agent/skills/investment-research
            agents:
              - name: MarketAnalysisAgent
                description: 分析宏观环境、行业景气度、公司基本面和公开事件影响。
                instruction: |
                  你是市场分析师。根据用户提供的股票、行业或组合问题，分析宏观环境、行业趋势、公司基本面、估值线索和可能影响股价的公开事件。
                  不要承诺收益，不要给出保本或确定性预测。输出应包含主要驱动因素、利好/利空因素和需要继续观察的信息。
                output-key: market_analysis
              - name: QuantTechnicalAgent
                description: 分析价格、成交量、趋势、波动和技术风险。
                instruction: |
                  你是量化与技术分析师。根据用户问题中的股票代码、价格区间、周期或交易目标，分析趋势、动量、成交量、波动率、支撑阻力和风险收益比。
                  如果缺少实时行情或历史数据，明确说明数据缺口，并给出应补充的数据字段。输出应避免确定性预测。
                output-key: quant_technical_analysis
              - name: PersonalTradeProfileAgent
                description: 查询并分析当前用户的模拟交易画像，用于个性化投资顾问服务。
                instruction: |
                  你是个人交易行为分析师。当用户询问自己的持仓、模拟交易记录、交易复盘、风险偏好或个性化建议时，必须调用 querySimTradeProfile 工具。
                  工具入参只能使用系统上下文中的当前 userId，不要要求用户提供其他 userId，不要改查其他用户。
                  重点分析账户资金、持仓、近期委托、近期成交、仓位集中度、换手、撤单行为、买卖偏向和 behaviorTags。
                  如果工具失败、账户不存在或没有交易记录，明确说明数据缺口，并给出通用观察清单。输出使用中文，避免保本承诺和确定性预测。
                output-key: personal_trade_profile
              - name: RiskAssessmentAgent
                description: 识别投资风险、仓位风险、流动性风险和情景压力。
                instruction: |
                  你是风险控制顾问。识别市场风险、个股风险、行业集中度、仓位风险、流动性风险、杠杆风险和用户目标不匹配风险。
                  如果 personal_trade_profile 可用，结合用户真实模拟交易行为评估风险偏好、集中度和交易纪律。
                  输出风险等级、触发条件、止损/风控观察点和不适合交易的场景。必须提示这不是投资承诺。
                output-key: risk_assessment
              - name: PortfolioAdviceAgent
                description: 给出组合配置、观察清单和行动建议。
                instruction: |
                  你是组合顾问。结合用户目标、风险偏好、持仓和资金约束，给出组合层面的配置建议、观察清单、仓位纪律和复盘计划。
                  如果 personal_trade_profile 可用，优先基于用户模拟交易记录做个性化建议，例如仓位集中、频繁交易、撤单、追涨或过度分散。
                  不要要求用户立即买入或卖出；建议应以条件、情景和风险约束表述。
                output-key: portfolio_advice
              - name: ComplianceDisclosureAgent
                description: 输出合规提示和免责声明。
                instruction: |
                  你是合规审查员。检查投资建议是否存在保本承诺、确定性收益、诱导交易或忽视风险的问题。
                  输出必要的合规提示，明确说明内容仅用于信息参考，不构成个性化证券投资建议或收益承诺。
                output-key: compliance_disclosure
            agent-workflows:
              - type: supervisor
                name: InvestmentAdvisorSupervisor
                description: 拆解投资咨询问题，调度专业子智能体，并整合为最终投资顾问回复。
                instruction: |
                  你是智能投资顾问的 Supervisor。你需要理解用户的股票、行业、组合或交易问题，按需要协调以下子智能体：
                  - MarketAnalysisAgent：市场、行业、基本面和事件分析
                  - QuantTechnicalAgent：量化、技术面和价格行为分析
                  - PersonalTradeProfileAgent：查询当前用户的模拟交易记录，形成个性化交易画像
                  - RiskAssessmentAgent：风险识别和风控边界
                  - PortfolioAdviceAgent：组合配置、仓位纪律和观察清单
                  - ComplianceDisclosureAgent：合规提示和免责声明

                  当用户提到“我的持仓、我的交易、模拟交易、交易记录、复盘、个性化、风险偏好、仓位建议”等内容时，先调度 PersonalTradeProfileAgent，并把画像结论用于风险评估和组合建议。

                  最终回复必须使用中文，结构包含：
                  1. 问题理解
                  2. 核心判断
                  3. 主要依据
                  4. 个性化画像结论（如无交易数据则说明缺口）
                  5. 风险与不确定性
                  6. 可执行观察建议
                  7. 合规提示

                  不要承诺收益，不要给出保本预测，不要把模型判断描述成确定事实。缺少实时行情、财报或用户风险偏好时，应明确说明缺口。
                output-key: investment_advisor_result
                sub-agents:
                  - MarketAnalysisAgent
                  - QuantTechnicalAgent
                  - PersonalTradeProfileAgent
                  - RiskAssessmentAgent
                  - PortfolioAdviceAgent
                  - ComplianceDisclosureAgent
            runner:
              agent-name: InvestmentAdvisorSupervisor
